<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diary</title>
</head>
<body>
<h1>Tagebuch</h1>
<p><a href="{{ url_for('diary_new') }}">Neuer Eintrag</a> | <a href="{{ url_for('logout') }}">Logout</a></p>

<ul>
    {% for e in entries %}
        <li>
            <a href="{{ url_for('diary_view', entry_id=e.id) }}">
                {{ e.title or e.id }} – {{ e.created_at }}
            </a>
        </li>
    {% else %}
        <li>Keine Einträge vorhanden.</li>
    {% endfor %}
</ul>

</body>
</html>
